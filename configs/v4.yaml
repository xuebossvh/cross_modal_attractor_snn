# ============================================================
# 跨模态循环吸引子 SNN — v4 冻结配置（50 epoch）
# 改动：stage2_end=35、cosine LR、音频/图像 loss 加强
# 对应 checkpoint: outputs/checkpoints/cross_modal_snn_v4.pt
# 对应 log:         outputs/logs/train_v4_50ep.log
# ============================================================

seed: 1234
device: "cuda"

snn:
  T: 20
  beta: 0.9
  v_threshold: 1.0
  surrogate_alpha: 2.0
  encoding: "current"
  img_encoding: "first_spike_trace"
  trace_decay: 0.9
  aud_encoder: "conv"
  aud_conv_ch1: 16
  aud_conv_ch2: 32

dims:
  img_in: 784
  img_hidden: 256
  D_img: 128
  N_key_img: 128

  aud_in: 1024
  aud_hidden: 128
  D_aud: 128
  N_key_aud: 128

  N_index: 512
  N_value_img: 384
  N_value_aud: 512

  num_classes: 10

index:
  alpha_img: 1.0
  alpha_aud: 1.0
  recurrent_scale: 0.2
  wta_mode: "kwta"
  k_wta: 96
  inhibition_strength: 1.0

value:
  binding_delay: 2

ablation:
  use_recurrent: true
  use_kwta: true
  use_delayed_value_target: true
  use_binding_phase: true
  use_modality_dropout: true
  use_audio_aux_cls: true

audio:
  use_real_audio: true
  feature: "log_mel"
  n_mels: 32
  n_frames: 32
  sample_rate: 8000
  duration_sec: 1.0
  fsdd_root: "_data/fsdd/recordings"
  auto_download: true
  toy_audio_prototype: false
  noise_std: 0.3

cue_modes:
  p_corrupt_img_only: 0.10
  p_corrupt_aud_only: 0.20
  p_corrupt_both: 0.20
  p_clean_img_only: 0.10
  p_clean_aud_only: 0.20
  p_clean_both: 0.20

corruption:
  train_severity: 0.5
  img_mode: "random"
  aud_mode: "random"
  curriculum_mode: "staged"
  severity_min: 0.1
  severity_max: 0.5
  stage1_end: 20
  stage2_end: 35

loss:
  lambda_cls: 1.0
  lambda_cls_aud_only_mult: 2.0
  lambda_img: 1.0
  lambda_aud: 4.0
  aud_weight_gamma: 5.0
  lambda_aud_grad: 1.0
  lambda_aud_active: 1.0
  lambda_audio_aux: 1.0
  lambda_bind_img: 1.0
  lambda_bind_aud: 1.0
  lambda_reg: 0.0005
  img_recon: "bce"
  lambda_img_l1: 0.5
  lambda_img_edge: 0.5

data:
  root: "_data"
  use_mnist: true
  batch_size: 128
  num_workers: 4
  train_subset: 0

train:
  epochs: 50
  lr: 0.001
  weight_decay: 0.0
  log_every: 50
  lr_scheduler: "cosine"
  lr_min: 0.00005
  lr_step_size: 15
  lr_gamma: 0.5
  ckpt_path: "outputs/checkpoints/cross_modal_snn_v4.pt"
