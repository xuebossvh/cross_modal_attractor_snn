# v8: class-detail disentanglement（在 v7 基础上）。
# 目标：让 Index/Value 保持类别级联想记忆稳定，同时用 audio cue detail residual
#      补偿样本级 log-mel 细节，避免 v6c 的音频近黑图和 v7 的分类/图像崩塌。
# 主要改动：
#   * Index -> V_aud -> AudioDecoder 输出类别级 audio base。
#   * Audio Encoder spike rate -> AudioResidualDecoder 输出有界 signed residual。
#   * image-only 没有 audio cue，因此 residual=0，只恢复 category audio。
#   * audio-only / both 有 audio cue，因此 recovered_audio = base + residual。
#   * 恢复较强 index_cons 以稳住类别 basin，降低音频 foreground/marginal 主干压力。

seed: 1234
device: "cuda"

snn:
  T: 20
  beta: 0.9
  v_threshold: 1.0
  surrogate_alpha: 2.0
  encoding: "current"
  img_encoding: "first_spike_trace"
  trace_decay: 0.9
  aud_encoder: "conv"
  aud_conv_ch1: 32
  aud_conv_ch2: 64
  aud_decoder_base_ch: 192
  aud_decoder_start_hw: 8
  aud_decoder_refine_blocks: 2

audio_detail:
  enabled: true
  hidden: 256
  scale: 0.35
  zero_init: true

dims:
  img_in: 784
  img_hidden: 256
  D_img: 128
  N_key_img: 128

  aud_in: 4096
  aud_hidden: 256
  D_aud: 128
  N_key_aud: 128

  N_index: 512
  N_value_img: 384
  N_value_aud: 768

  num_classes: 10

index:
  alpha_img: 1.0
  alpha_aud: 1.0
  recurrent_scale: 0.2
  wta_mode: "kwta"
  k_wta: 96
  inhibition_strength: 1.0

value:
  binding_delay: 2

ablation:
  use_recurrent: true
  use_kwta: true
  use_delayed_value_target: true
  use_binding_phase: true
  use_modality_dropout: true
  use_audio_aux_cls: true

audio:
  use_real_audio: true
  feature: "log_mel"
  n_mels: 64
  n_frames: 64
  sample_rate: 8000
  duration_sec: 1.0
  fsdd_root: "_data/fsdd/recordings"
  auto_download: true
  toy_audio_prototype: false
  noise_std: 0.3
  norm_mode: "global"
  norm_stats_path: "_data/audio_norm_stats.pt"
  norm_percentile_lo: 1.0
  norm_percentile_hi: 99.0
  encoder_norm_mode: "hybrid"
  encoder_local_mix: 0.5

cue_modes:
  p_corrupt_img_only: 0.10
  p_corrupt_aud_only: 0.20
  p_corrupt_both: 0.20
  p_clean_img_only: 0.10
  p_clean_aud_only: 0.20
  p_clean_both: 0.20

corruption:
  train_severity: 0.5
  img_mode: "random"
  aud_mode: "random"            # legacy 回退；v7 训练实际用 aud_train_modes/课程
  curriculum_mode: "staged"
  severity_min: 0.1
  severity_max: 0.5
  stage1_end: 20
  stage2_end: 35
  # v7: 受控训练残缺池（避免 full-random 让模型放弃样本级音频恢复）
  aud_train_modes: ["time_mask", "freq_mask", "time_freq_block", "gaussian"]
  # v7: 课程式音频残缺（前期轻 time/freq mask -> 中期 block -> 后期混合）
  aud_family_curriculum:
    enabled: true
    early: ["time_mask", "freq_mask"]
    mid: ["time_freq_block"]
    late: ["time_mask", "freq_mask", "time_freq_block", "gaussian"]
  # v7: fixed_mask 评估协议固定 family（论文主对照，跨版本同一套 mask）
  eval_fixed:
    img_mode: "occlusion"
    aud_mode: "time_freq_block"

loss:
  lambda_cls: 1.0
  lambda_cls_aud_only_mult: 2.0
  lambda_img: 1.0
  lambda_aud: 4.0
  aud_weight_gamma: 5.0
  lambda_aud_grad: 1.0
  lambda_aud_foreground: 0.5       # v8: residual 分担样本细节，避免音频 loss 压垮 Index
  aud_foreground_top_fraction: 0.15
  lambda_aud_marginal: 0.15
  lambda_aud_active: 1.0
  lambda_aud_residual_l2: 0.01
  lambda_audio_aux: 1.0
  lambda_bind_img: 1.0
  lambda_bind_aud: 1.0
  lambda_reg: 0.0005
  img_recon: "bce"
  lambda_img_l1: 0.5
  lambda_img_edge: 0.5

  lambda_index_cons: 0.5           # v8: 让 Index 重新稳住类别 basin
  lambda_soft_cls: 0.5
  soft_cls_temperature: 2.0
  align_teacher_modes: ["corrupt_both"]
  lambda_key_align: 0.2
  key_align_temperature: 0.1
  key_align_modes: ["corrupt_both", "clean_both"]

  aud_sample_curriculum:
    enabled: true
    modes: ["corrupt_both"]
    start_epoch: 0
    end_epoch: 35
    max_sample_mix: 1.0            # audio cue residual 负责后期样本级修正

data:
  root: "_data"
  use_mnist: true
  batch_size: 128
  num_workers: 4
  train_subset: 0

train:
  output_version: v8
  epochs: 50
  lr: 0.001
  weight_decay: 0.0
  log_every: 50
  lr_scheduler: "cosine"
  lr_min: 0.00005
  lr_step_size: 15
  lr_gamma: 0.5
  init_ckpt_path: ""
  init_strict: false
  ckpt_path: "outputs/checkpoints/cross_modal_snn_v8.pt"
